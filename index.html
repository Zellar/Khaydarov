<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/fonts.css">
    <link rel="stylesheet" href="./css/bootstrap-reboot.min.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>TMA</title>
</head>
<body>
    <header class="header container">

        <div class="header__logo">
            <div class="logo">
                <div class="logo__text">
                    Ruslan Khaydarov.
                </div>
                <div class="logo__text">
                    Designer
                </div>
            </div>
        </div>

        <nav class="header__nav">
            <button class="burger" type="button" aria-label="Menu" aria-expanded="false">
                <span class="burger__line"></span>
                <span class="burger__line"></span>
            </button>

            <div class="nav">
                <a href="./projects/index.html" class="nav__item">
                    Проекты
                </a>
                <a href="./about/index.html" class="nav__item">
                    Обо мне
                </a>
                <a href="./contacts/index.html" class="nav__item">
                    Контакты
                </a>
            </div>

            <div class="nav-overlay" hidden></div>
        </nav>
        

    </header>

    <div class="hero hero--main">
        <div class="container">
            <img 
            class="hero__img hero__img--main" 
            srcset="./image/main-img.webp 1x, ./image/main-img.webp 2x"
            src="./image/main-img.webp" 
            alt="" 
            loading="eager"
            fetchpriority="high">
        </div>
        
    </div>

    <main class="main container">

        <section class="section-main">
            <div class="section-main__text-block">
                <h1 class="section-main__h1">
                    Специализация
                </h1>
                <p>
                    Айдентика
                    <br>
                    Диджитал дизайн
                    <br>
                    Дизайн упаковки
                </p>
            </div>
        </section>

        <section class="section-process">
            <h1 class="section-process__h1">
                Процесс
            </h1>
            <div class="section-process__graph">
                <div class="section-process__graph-item">
                    <div class="ball-block">
                        <span class="ball-block__text">
                            Исследование
                        </span>
                    </div>
                </div>
                <div class="section-process__graph-item">
                    <div class="arrow-block">
                        <img class="arrow-block__img" src="./image/arrow.svg" alt="">
                    </div>
                </div>
                <div class="section-process__graph-item">
                    <div class="ball-block">
                        <span class="ball-block__text">
                            Стратегия
                        </span>
                    </div>
                </div>
                <div class="section-process__graph-item">
                    <div class="arrow-block">
                        <img class="arrow-block__img" src="./image/arrow.svg" alt="">
                    </div>
                </div>
                <div class="section-process__graph-item">
                    <div class="ball-block">
                        <span class="ball-block__text">
                            Дизайн
                        </span>
                    </div>
                </div>
            </div>
        </section>

        <section class="section-projects">
            <h1 class="section-projects__h1">
                Проекты
            </h1>

            <div class="section-projects__project-links">
                <a href="./tma/index.html" class="section-projects__project-link">
                    <img src="./image/link-img.webp" alt="">
                </a>
                <a href="./asphalt/index.html" class="section-projects__project-link">
                    <img src="./image/link-img.webp" alt="">
                </a>
                <a href="" class="section-projects__project-link">
                    <img src="./image/link-img.webp" alt="">
                </a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container footer__container">
            <div class="footer__logo">
                <div class="logo">
                    <div class="logo__text">
                        Ruslan Khaydarov.
                    </div>
                    <div class="logo__text">
                        Designer
                    </div>
                </div>
            </div>
            <div class="footer__contacts">
                <a href="#" class="footer__link">
                    Mail: deruslan2000@gmail.com
                </a>
                <a href="#" class="footer__link">
                    Telegram: de_ruslan
                </a>
            </div>
        </div>
    </footer>

    <script src="./js/main.js"></script>
</body>

</html>
